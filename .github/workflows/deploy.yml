name: Deploy web build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Права, нужные actions/deploy-pages (без них падает с 403).
permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; новый пуш не отменяет уже идущий деплой.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # npm install, а не ci: package-lock дрейфит на тяжёлом electron-builder-дереве
      # (скос npm/платформы), но веб-сборке нужны только vite/ts/pixi. install
      # резолвит рабочее дерево из package.json без строгой сверки лока.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
